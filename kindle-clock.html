<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=758, initial-scale=1.0">
  <meta http-equiv="refresh" content="43200">
  <title>Kindle Clock</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-animation: none !important; animation: none !important;
      -webkit-transition: none !important; transition: none !important;
    }

    html { height: 100%; overflow: hidden; }

    body {
      width: 758px; height: 100%;
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
    }

    /* ── Page Wrapper ──────────────────────────────────── */
    #page-wrapper {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      min-height: 0; overflow: hidden;
    }

    .page {
      width: 758px; overflow: hidden;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      min-height: 0;
    }

    /* ── Clock Page ────────────────────────────────────── */
    .content {
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      min-height: 0; padding: 8px;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
    }

    .clock-card {
      background: #fff; border-radius: 36px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      padding: 31px 32px;
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      min-height: 0; margin-bottom: 8px; overflow: hidden;
    }

    .clock-digits { overflow: hidden; width: 678px; height: 356px; }

    .digit-card {
      float: left; width: 326px; height: 356px;
      background: #000; border-radius: 32px; overflow: hidden;
      text-align: center; line-height: 356px; position: relative;
    }
    .digit-card + .digit-card { margin-left: 26px; }

    .digit-number {
      font-weight: bold; font-size: 180px; color: #fff;
      line-height: 356px; white-space: nowrap; position: relative; z-index: 1;
    }

    .digit-line {
      position: absolute; top: 50%; left: 34px; right: 34px;
      height: 6px; margin-top: -3px; background: rgba(0,0,0,.85); z-index: 2;
    }

    .bottom-row {
      height: 367px; -webkit-flex-shrink: 0; flex-shrink: 0; margin-bottom: 8px;
    }
    .bottom-row::after { content: ''; display: block; clear: both; }

    .date-card, .quote-card {
      float: left; background: #fff; border-radius: 36px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      padding: 32px; width: 367px; height: 367px;
    }
    .date-card { margin-right: 8px; text-align: center; }
    .date-weekday { font-size: 32px; font-weight: 500; color: #000; margin-bottom: 16px; }
    .date-rule { height: 1px; background: #e0e0e0; margin-bottom: 28px; }
    .date-day { font-size: 120px; font-weight: bold; color: #000; line-height: 1; margin-bottom: 20px; }
    .date-lunar { font-size: 32px; color: #ababab; }

    .quote-label {
      background: #ededed; border-radius: 38px; height: 56px; line-height: 56px;
      text-align: center; font-size: 24px; font-weight: 500; color: #000; margin-bottom: 20px;
    }
    .quote-body {
      font-size: 30px; font-weight: 500; color: #000;
      line-height: 1.4; margin-bottom: 16px; overflow: hidden; max-height: 168px;
    }
    .quote-author { font-size: 22px; color: #ababab; text-align: right; }

    /* ── Nav Bar ───────────────────────────────────────── */
    .bottom-nav {
      background: #fff; border-radius: 60px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      height: 90px; -webkit-flex-shrink: 0; flex-shrink: 0;
      padding: 17px 100px; position: relative; overflow: hidden;
      margin: 0 8px 8px;
    }

    .nav-active-bar {
      position: absolute; bottom: 0; left: 85px;
      width: 86px; height: 6px; background: #000;
      border-radius: 58px 58px 0 0;
    }

    .nav-icons { overflow: hidden; }
    .nav-icon {
      float: left; width: 56px; height: 56px; overflow: hidden; cursor: pointer;
    }
    .nav-icon + .nav-icon { margin-left: 106px; }
    .nav-icon svg, .nav-icon img { width: 56px; height: 56px; }

    /* ── Noodle Page ───────────────────────────────────── */
    .noodle-page {
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      min-height: 0;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
      padding: 8px;
    }

    .noodle-state {
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      min-height: 0;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
    }

    .noodle-title {
      font-size: 48px; font-weight: bold; color: #000;
      padding: 24px 20px 0;
      -webkit-flex-shrink: 0; flex-shrink: 0;
    }

    .noodle-img-wrap {
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      min-height: 0; overflow: hidden; position: relative;
    }

    .noodle-img-wrap img {
      position: absolute;
      bottom: 0; left: 50%;
      -webkit-transform: translateX(-50%);
      transform: translateX(-50%);
      width: 600px; height: 600px;
    }

    .noodle-actions {
      -webkit-flex-shrink: 0; flex-shrink: 0;
      padding: 24px 56px 20px;
      text-align: center;
    }

    /* Time segmented control */
    .time-seg {
      display: inline-block; vertical-align: top;
      border: 2px solid #000; border-radius: 45px; overflow: hidden;
    }
    .tseg-btn {
      float: left;
      font-size: 32px; font-weight: bold; line-height: 1;
      padding: 20px 36px; cursor: pointer; color: #000; background: none;
    }
    .tseg-btn.selected { background: rgba(0,0,0,0.12); }
    /* 72px inner height + 2px border top/bottom = 76px outer */
    .tseg-sep { float: left; width: 2px; height: 72px; background: #000; }

    /* Start button (state 0) — no border so padding: 22px → 76px total */
    .btn-start {
      display: inline-block; vertical-align: top; margin-left: 24px;
      background: #000; color: #fff; border-radius: 45px;
      font-size: 32px; font-weight: bold; line-height: 1; text-align: center;
      padding: 22px 40px; cursor: pointer;
    }

    /* Outline buttons — 2px border so padding: 20px → 76px total */
    .btn-outline {
      display: inline-block;
      border: 2px solid #000; border-radius: 45px; background: none;
      font-size: 32px; font-weight: bold; line-height: 1; color: #000;
      padding: 20px 36px; cursor: pointer; vertical-align: top;
    }

    /* State 1 buttons: centered */
    .action-center { text-align: center; }

    /* State 2: 再来 + 去读书 */
    .btn-again {
      float: left; margin-right: 24px;
      border: 2px solid #000; border-radius: 45px; background: none;
      font-size: 32px; font-weight: bold; line-height: 1; color: #000;
      padding: 20px 40px; cursor: pointer;
    }
    .btn-goread {
      overflow: hidden;
      background: #000; color: #fff; border-radius: 45px;
      font-size: 32px; font-weight: bold; line-height: 1; text-align: center;
      padding: 22px 32px; cursor: pointer;
    }

    /* ── Reading Page ──────────────────────────────────── */
    .reading-page {
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      min-height: 0;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
      padding: 40px 56px 24px;
    }

    .reading-title { font-size: 48px; font-weight: bold; color: #000; margin-bottom: 10px; }
    .reading-subtitle { font-size: 24px; color: #000; opacity: 0.5; margin-bottom: 40px; }

    .reading-steps {
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; min-height: 0;
    }

    .reading-step {
      border: 2px solid #000; border-radius: 32px;
      padding: 20px 24px; margin-bottom: 16px;
    }
    .reading-step::after { content: ''; display: block; clear: both; }

    .step-num {
      float: left; width: 56px; height: 56px;
      background: #000; color: #fff; border-radius: 12px;
      font-size: 40px; font-weight: bold;
      text-align: center; line-height: 56px; margin-right: 18px;
    }

    .step-text { overflow: hidden; }
    .step-main { font-size: 32px; font-weight: bold; color: #000; }
    .step-sub { font-size: 24px; color: #000; opacity: 0.5; margin-top: 4px; }

    .reading-cta {
      display: block; background: #000; color: #fff; border-radius: 45px;
      font-size: 32px; font-weight: bold; text-align: center;
      padding: 16px 32px; cursor: pointer; margin-bottom: 28px;
      -webkit-flex-shrink: 0; flex-shrink: 0;
    }

    .reading-footer {
      font-size: 24px; color: #000; opacity: 0.5;
      text-align: center; -webkit-flex-shrink: 0; flex-shrink: 0;
    }
  </style>
</head>

          <div class="clock-digits">

          </div>
          <div class="quote-card">

            <div class="quote-body">再多的焦虑也改变不了未来。再多的后悔也改变不了过去。</div>
            <div class="quote-author">- Karen Salmansohn</div>
          </div>

    <!-- Page 1: Placeholder -->
    <div id="page-1" class="page" style="display:none">
      <div style="height:100%;text-align:center;padding-top:300px;">
        <p style="font-size:32px;color:#ababab;">敬请期待</p>

    <!-- Page 2: Noodle Timer -->

  </div><!-- #page-wrapper -->

  <!-- Shared Nav Bar -->
  <div class="bottom-nav">

          <line x1="23" y1="19" x2="35" y2="19" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="23" y1="26" x2="35" y2="26" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>

        </svg>

    </div>
  </div>

  <script>
    /* ── Tab Switching ──────────────────────────────────── */
    var currentTab = 0;
    var NAV_LEFT = [85, 247, 409, 571];

    function switchTab(tab) {
      if (currentTab === 2 && tab !== 2) { pauseNoodleTimer(); }
      if (tab === 2 && noodleState === 1) { resumeNoodleTimer(); }
      for (var i = 0; i < 4; i++) {
        document.getElementById('page-' + i).style.display = (i === tab) ? '' : 'none';
      }
      document.getElementById('nav-bar').style.left = NAV_LEFT[tab] + 'px';
      currentTab = tab;
    }

    /* ── Clock ──────────────────────────────────────────── */
    var WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    var MONTHS   = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    var LUNAR_MONTHS = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
    var LUNAR_DAYS = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
      '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
      '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

    var MS_PER_DAY = 86400000;
    var LUNAR_ANCHORS = [
      { g: Date.UTC(2025, 0, 29), lm: 0 },
      { g: Date.UTC(2026, 0, 28), lm: 0 }
    ];
    var LUNAR_MONTH_LENGTHS = [30,29,30,29,30,30,29,30,29,30,29,30];
    var tzOffsetMs = 8 * 3600000;
    var _lunarCache = { day: -1, label: '' };

    function getLocalDate() { return new Date(Date.now() + tzOffsetMs); }

    function toLunarLabel(date) {
      var y = date.getUTCFullYear(), mo = date.getUTCMonth(), d = date.getUTCDate();
      var key = d + mo * 31 + y * 372;
      if (_lunarCache.day === key) { return _lunarCache.label; }
      var dayMs = Date.UTC(y, mo, d);
      var anchor = LUNAR_ANCHORS[0];
      for (var i = 0; i < LUNAR_ANCHORS.length; i++) {
        if (dayMs >= LUNAR_ANCHORS[i].g) { anchor = LUNAR_ANCHORS[i]; } else { break; }
      }
      var remaining = Math.floor((dayMs - anchor.g) / MS_PER_DAY);
      var lm = anchor.lm, ld = 0;
      for (var j = 0; j < LUNAR_MONTH_LENGTHS.length; j++) {
        var len = LUNAR_MONTH_LENGTHS[(lm + j) % 12];
        if (remaining < len) { lm = (lm + j) % 12; ld = remaining; break; }
        remaining -= len;
      }
      _lunarCache.day = key;
      _lunarCache.label = LUNAR_MONTHS[lm] + LUNAR_DAYS[ld];
      return _lunarCache.label;
    }

    function pad(n) { return (n < 10 ? '0' : '') + n; }

    var elHour    = document.getElementById('hour');
    var elMinute  = document.getElementById('minute');
    var elWeekday = document.getElementById('weekday-month');
    var elDay     = document.getElementById('day-number');
    var elLunar   = document.getElementById('lunar-date');

    function updateClock() {
      var now = getLocalDate();
      elHour.textContent    = pad(now.getUTCHours());
      elMinute.textContent  = pad(now.getUTCMinutes());
      elWeekday.textContent = WEEKDAYS[now.getUTCDay()] + ' ' + MONTHS[now.getUTCMonth()];
      elDay.textContent     = pad(now.getUTCDate());
      elLunar.textContent   = toLunarLabel(now);
    }

    function fetchTimezone() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'http://ip-api.com/json?fields=offset,city,lat,lon', true);
      xhr.timeout = 5000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            if (typeof data.offset === 'number') {
              tzOffsetMs = data.offset * 1000;
              _lunarCache.day = -1;
              updateClock();
            }
          } catch(e) {}
        }
      };
      xhr.send();
    }

    updateClock();
    fetchTimezone();
    setInterval(updateClock, 60000);

    /* ── Noodle Timer ───────────────────────────────────── */
    var noodleState = 0;
    var noodleMins = 3;
    var noodleSecsLeft = 0;
    var noodleTimer = null;

    function selectTime(m) {
      noodleMins = m;
      document.getElementById('btn-3min').className = 'tseg-btn' + (m === 3 ? ' selected' : '');
      document.getElementById('btn-5min').className = 'tseg-btn' + (m === 5 ? ' selected' : '');
    }

    function showNoodleState(s) {
      for (var i = 0; i < 3; i++) {
        document.getElementById('noodle-s' + i).style.display = (i === s) ? '' : 'none';
      }
      noodleState = s;
    }

    function updateCountdown() {
      document.getElementById('noodle-countdown').textContent =
        '焖煮中...剩余 ' + pad(Math.floor(noodleSecsLeft / 60)) + ':' + pad(noodleSecsLeft % 60);
    }

    function noodleTick() {
      noodleSecsLeft--;
      updateCountdown();
      if (noodleSecsLeft <= 0) { finishNoodle(); }
    }

    function startNoodle() {
      noodleSecsLeft = noodleMins * 60;
      showNoodleState(1);
      updateCountdown();
      noodleTimer = setInterval(noodleTick, 1000);
    }

    function cancelNoodle() {
      if (noodleTimer) { clearInterval(noodleTimer); noodleTimer = null; }
      showNoodleState(0);
    }

    function finishNoodle() {
      if (noodleTimer) { clearInterval(noodleTimer); noodleTimer = null; }
      showNoodleState(2);
    }

    function resetNoodle() { showNoodleState(0); }

    function pauseNoodleTimer() {
      if (noodleTimer) { clearInterval(noodleTimer); noodleTimer = null; }
    }

    function resumeNoodleTimer() {
      if (noodleState === 1 && !noodleTimer) {
        noodleTimer = setInterval(noodleTick, 1000);
      }
    }
  </script>
