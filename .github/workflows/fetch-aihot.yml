name: Fetch AI HOT Daily Report

on:
  workflow_dispatch: # 由外部 cron-job.org 触发，不依赖 GitHub 自带定时

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create data directory
        run: mkdir -p data/archive

      - name: Fetch latest daily report
        id: fetch
        run: |
          # 网站新规则：定时任务用「能识别的非浏览器 UA」，不要伪装 Mozilla/Chrome/Safari
          UA="kindle-clock/1.0 (+https://github.com/${{ github.repository }})"

          # 先写临时文件，成功后再替换，避免损坏现有数据
          # 正常响应 <1s；被边缘防护挂起(tarpit)时连接会静默停滞。
          # --speed-time/--speed-limit: 连续 8s 速度低于 100B/s 视为被挂起，立刻掐掉换下一次重试，
          # 比干等 --max-time 快得多。--max-time 20 只是兜底硬上限。
          HTTP_STATUS=$(curl -s -o data/daily.json.tmp -w "%{http_code}" \
            --connect-timeout 10 --max-time 20 \
            --speed-time 8 --speed-limit 100 \
            --retry 5 --retry-delay 3 --retry-all-errors \
            -H "User-Agent: $UA" \
            https://aihot.virxact.com/api/public/daily) || HTTP_STATUS="000"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "API returned $HTTP_STATUS, skipping"
            rm -f data/daily.json.tmp
            echo "success=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          mv data/daily.json.tmp data/daily.json
          echo "success=true" >> $GITHUB_OUTPUT
          echo "Fetched daily.json successfully"

      - name: Archive today's report
        if: steps.fetch.outputs.success == 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cp data/daily.json data/archive/$TODAY.json
          echo "Archived to data/archive/$TODAY.json"

      - name: Fetch dailies index (最近 30 期列表)
        if: steps.fetch.outputs.success == 'true'
        run: |
          UA="kindle-clock/1.0 (+https://github.com/${{ github.repository }})"

          HTTP_STATUS=$(curl -s -o data/dailies-index.json.tmp -w "%{http_code}" \
            --connect-timeout 10 --max-time 20 \
            --speed-time 8 --speed-limit 100 \
            --retry 5 --retry-delay 3 --retry-all-errors \
            -H "User-Agent: $UA" \
            'https://aihot.virxact.com/api/public/dailies?take=30') || HTTP_STATUS="000"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "dailies-index API returned $HTTP_STATUS, skipping"
            rm -f data/dailies-index.json.tmp
          else
            mv data/dailies-index.json.tmp data/dailies-index.json
            echo "Fetched dailies-index.json"
          fi

      - name: Commit if changed
        if: steps.fetch.outputs.success == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "chore: update AI HOT daily $(date -u +%Y-%m-%d)" && git push)
